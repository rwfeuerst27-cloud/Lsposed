name: Build LSPosed

on:
  push:
    branches: [ main, master, 'claude/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Init submodules (skip LSPlant test deps)
        run: |
          git submodule update --init external/cxx external/dobby external/fmt
          git submodule update --init external/lsplant
          # Init LSPlant's own submodules, skipping private test repos
          git -C external/lsplant submodule update --init \
            docs/doxygen-awesome-css \
            lsplant/src/main/jni/external/dex_builder

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install \
            "ndk;26.1.10909125" \
            "cmake;3.22.1" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Set up local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> local.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lsposed-debug
          path: app/build/outputs/apk/debug/*.apk

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Init submodules (skip LSPlant test deps)
        run: |
          git submodule update --init external/cxx external/dobby external/fmt
          git submodule update --init external/lsplant
          git -C external/lsplant submodule update --init \
            docs/doxygen-awesome-css \
            lsplant/src/main/jni/external/dex_builder

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install \
            "ndk;26.1.10909125" \
            "cmake;3.22.1" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Set up signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> local.properties
          echo "androidStoreFile=$(pwd)/keystore.jks" >> local.properties
          echo "androidStorePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "androidKeyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "androidKeyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Build release
        run: ./gradlew :magisk-loader:zipRelease :app:assembleRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lsposed-release
          path: |
            app/build/outputs/apk/release/*.apk
            magisk-loader/build/outputs/*.zip
